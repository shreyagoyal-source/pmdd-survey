<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menstrual Health & Nutrition Survey</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="survey">
    <div class="intro" id="intro">
      <header class="survey__header">
        <h1>Menstrual Health & Nutrition Survey</h1>
        <p class="survey__purpose">Help us understand how diet and symptoms relate to your menstrual experience. Your responses are anonymous and will only be used for research insights.</p>
      </header>
      <button type="button" id="beginBtn" class="btn btn--primary">
        Begin Survey
      </button>
    </div>

    <section class="survey__container" id="surveyContainer" style="display: none;">
      <!-- Pages will be injected here -->
    </section>

    <nav class="survey__nav" style="display: none;">
      <button type="button" id="prevBtn" class="btn btn--secondary" disabled>
        ← Previous
      </button>
      <button type="button" id="nextBtn" class="btn btn--primary">
        Next →
      </button>
    </nav>

    <footer class="survey__footer" style="display: none;">
      <p class="survey__progress" id="progressText">Page 1 of 5</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
